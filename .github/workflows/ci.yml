name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Format check (ruff)
        run: ruff format --check app/ tests/

      - name: Complexity gate (C901 max 15)
        run: ruff check --select C901 app/

      - name: Security (bandit)
        run: bandit -r app/ -ll -q

      - name: Dependency audit (pip-audit)
        run: pip-audit --strict --desc 2>/dev/null || echo "::warning::pip-audit found vulnerabilities"

      # ── Architecture conformity ─────────────────────────────────────────
      - name: "Architecture: API layer must not import Repository directly"
        run: |
          VIOLATIONS=$(grep -rn "from app.db.repository\|import app.db.repository" \
            app/api/ 2>/dev/null | grep -v __pycache__ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::API layer must access DB via request.app.state.repo, not direct import:"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: "Architecture: Pipeline must not import API layer"
        run: |
          VIOLATIONS=$(grep -rn "from app.api\|import app.api" \
            app/pipeline/ app/services/ app/db/ 2>/dev/null | grep -v __pycache__ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Service/Pipeline/DB layer must not import from api/:"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: "Architecture: Repository must not import services/pipeline"
        run: |
          VIOLATIONS=$(grep -rn "from app.services\|from app.pipeline\|import app.services\|import app.pipeline" \
            app/db/ 2>/dev/null | grep -v __pycache__ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Repository layer must not import upstream layers:"
            echo "$VIOLATIONS"
            exit 1
          fi

      # ── OWASP / Security checks (LR-AutoTag specific) ───────────────────
      - name: "OWASP A01: API key required for non-health endpoints"
        run: |
          if ! grep -q "api_key_middleware" app/main.py; then
            echo "::error::main.py must register api_key_middleware"
            exit 1
          fi
          if ! grep -q "/api/v1/health" app/api/auth.py; then
            echo "::error::auth.py must whitelist /api/v1/health endpoint"
            exit 1
          fi

      - name: "OWASP A03: No SQL string interpolation in DB layer"
        run: |
          # Detect f-string SQL or % concatenation in queries
          VIOLATIONS=$(grep -rnE 'execute\s*\(\s*f"|execute\s*\(\s*".*"\s*%' \
            app/db/ 2>/dev/null | grep -v __pycache__ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::SQL queries must use parameterized form, not f-strings or %:"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: "OWASP A05: No hardcoded secrets"
        run: |
          # API key and DB URL must come from settings, not be hardcoded in app code
          VIOLATIONS=$(grep -rn "password=\|api_key=\"[a-zA-Z]" app/ 2>/dev/null \
            | grep -v __pycache__ \
            | grep -v "config.py" \
            | grep -v "test" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Possible hardcoded secrets outside config.py:"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: "Ollama rate-limit semaphore present"
        run: |
          if ! grep -q "Semaphore" app/pipeline/ollama_client.py; then
            echo "::error::Ollama client must use a Semaphore to protect the shared service"
            exit 1
          fi

      - name: "Nominatim throttle present"
        run: |
          if ! grep -q "_throttle\|sleep" app/pipeline/geocoder.py; then
            echo "::error::Geocoder must throttle requests (1 req/sec for public Nominatim)"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lr_autotag
          POSTGRES_PASSWORD: lr_autotag
          POSTGRES_DB: lr_autotag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql://lr_autotag:lr_autotag@localhost:5432/lr_autotag_test
        run: pytest tests/integration/ -v --tb=short

      - name: Run system tests
        env:
          TEST_DATABASE_URL: postgresql://lr_autotag:lr_autotag@localhost:5432/lr_autotag_test
        run: pytest tests/system/ -v --tb=short

      - name: Combined coverage report
        env:
          TEST_DATABASE_URL: postgresql://lr_autotag:lr_autotag@localhost:5432/lr_autotag_test
        run: |
          pytest tests/unit/ tests/integration/ tests/system/ \
            --cov=app --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=html:coverage-html \
            --cov-report=xml:coverage.xml

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: backend/coverage-html/
          retention-days: 30

      - name: Line coverage gate (80%)
        run: coverage report --fail-under=80

      - name: Branch coverage gate (70%)
        run: |
          BRANCH_PCT=$(coverage report | tail -1 | awk '{print $(NF-1)}' | tr -d '%')
          echo "Branch coverage: ${BRANCH_PCT}%"
          if [ "$(echo "$BRANCH_PCT < 70" | bc -l)" = "1" ]; then
            echo "::error::Branch coverage ${BRANCH_PCT}% is below 70% threshold"
            exit 1
          fi

      - name: Test results step summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pytest tests/unit/ tests/integration/ tests/system/ --tb=no -q 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Coverage report as step summary
        if: always()
        run: |
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report --show-missing | tail -25 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  nfa:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lr_autotag
          POSTGRES_PASSWORD: lr_autotag
          POSTGRES_DB: lr_autotag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Performance benchmarks
        env:
          TEST_DATABASE_URL: postgresql://lr_autotag:lr_autotag@localhost:5432/lr_autotag_test
        run: pytest tests/nfa/test_performance.py -v --timeout=120

      - name: Security tests
        env:
          TEST_DATABASE_URL: postgresql://lr_autotag:lr_autotag@localhost:5432/lr_autotag_test
        run: pytest tests/nfa/test_security.py -v --timeout=60
