<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 1.5; }
      .grid { stroke: #e0e0e0; stroke-width: 0.5; }
      .label { font-size: 12px; fill: #333; }
      .title { font-size: 16px; fill: #111; font-weight: bold; }
      .subtitle { font-size: 11px; fill: #666; }
      .dot-best { fill: #2563eb; }
      .dot-good { fill: #059669; }
      .dot-mid { fill: #d97706; }
      .dot-bad { fill: #dc2626; }
      .annotation { font-size: 10px; fill: #555; }
      .model-label { font-size: 11px; font-weight: 600; }
      .zone-best { fill: #dbeafe; opacity: 0.4; }
      .zone-ok { fill: #fef3c7; opacity: 0.3; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Vision-Modelle: Qualitaet vs. Geschwindigkeit (GPU)</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Score (%) vs. Inferenzzeit (s/Bild) — Nvidia P40 24 GB, 250 W, V2 Prompt</text>

  <!-- Chart area: x=80..750, y=70..430 -->
  <!-- X axis: 0..300s, Y axis: 0..100% -->
  <!-- Scaling: x = 80 + (time/300)*670; y = 430 - (score/100)*360 -->

  <!-- Ideal zone (top-left) -->
  <rect x="80" y="70" width="180" height="144" class="zone-best" rx="8"/>
  <text x="95" y="88" class="annotation" fill="#1e40af" opacity="0.7">Idealbereich (schnell + stark)</text>

  <!-- Grid lines Y -->
  <line x1="80" y1="106" x2="750" y2="106" class="grid"/><!-- 90% -->
  <line x1="80" y1="142" x2="750" y2="142" class="grid"/><!-- 80% -->
  <line x1="80" y1="178" x2="750" y2="178" class="grid"/><!-- 70% -->
  <line x1="80" y1="214" x2="750" y2="214" class="grid"/><!-- 60% -->
  <line x1="80" y1="250" x2="750" y2="250" class="grid"/><!-- 50% -->
  <line x1="80" y1="286" x2="750" y2="286" class="grid"/><!-- 40% -->
  <line x1="80" y1="322" x2="750" y2="322" class="grid"/><!-- 30% -->
  <line x1="80" y1="358" x2="750" y2="358" class="grid"/><!-- 20% -->
  <line x1="80" y1="394" x2="750" y2="394" class="grid"/><!-- 10% -->

  <!-- Grid lines X (20s pro Tick, bei 300s max -> 15 Ticks; wir zeichnen grobe Ticks alle 50s) -->
  <line x1="192" y1="70" x2="192" y2="430" class="grid"/><!-- 50s -->
  <line x1="303" y1="70" x2="303" y2="430" class="grid"/><!-- 100s -->
  <line x1="415" y1="70" x2="415" y2="430" class="grid"/><!-- 150s -->
  <line x1="527" y1="70" x2="527" y2="430" class="grid"/><!-- 200s -->
  <line x1="638" y1="70" x2="638" y2="430" class="grid"/><!-- 250s -->
  <line x1="750" y1="70" x2="750" y2="430" class="grid"/><!-- 300s -->

  <!-- Axes -->
  <line x1="80" y1="430" x2="750" y2="430" class="axis"/>
  <line x1="80" y1="70" x2="80" y2="430" class="axis"/>

  <!-- X axis labels -->
  <text x="80" y="450" text-anchor="middle" class="label">0</text>
  <text x="192" y="450" text-anchor="middle" class="label">50</text>
  <text x="303" y="450" text-anchor="middle" class="label">100</text>
  <text x="415" y="450" text-anchor="middle" class="label">150</text>
  <text x="527" y="450" text-anchor="middle" class="label">200</text>
  <text x="638" y="450" text-anchor="middle" class="label">250</text>
  <text x="750" y="450" text-anchor="middle" class="label">300</text>
  <text x="415" y="475" text-anchor="middle" class="label" font-weight="600">Sekunden pro Bild (GPU) →</text>

  <!-- Y axis labels -->
  <text x="72" y="434" text-anchor="end" class="label">0%</text>
  <text x="72" y="398" text-anchor="end" class="label">10%</text>
  <text x="72" y="362" text-anchor="end" class="label">20%</text>
  <text x="72" y="326" text-anchor="end" class="label">30%</text>
  <text x="72" y="290" text-anchor="end" class="label">40%</text>
  <text x="72" y="254" text-anchor="end" class="label">50%</text>
  <text x="72" y="218" text-anchor="end" class="label">60%</text>
  <text x="72" y="182" text-anchor="end" class="label">70%</text>
  <text x="72" y="146" text-anchor="end" class="label">80%</text>
  <text x="72" y="110" text-anchor="end" class="label">90%</text>
  <text x="72" y="74" text-anchor="end" class="label">100%</text>
  <text x="30" y="250" text-anchor="middle" class="label" font-weight="600" transform="rotate(-90 30 250)">← Score (%)</text>

  <!-- Data points (GPU run 2026-04-15) -->
  <!-- LLaVA 13B: 15,8s, 77% — STAR -->
  <polygon points="115,125 119,136 131,136 121,143 125,155 115,147 105,155 109,143 99,136 111,136" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="140" y="130" text-anchor="start" class="model-label" fill="#2563eb" font-size="13px">★ LLaVA 13B</text>
  <text x="140" y="144" text-anchor="start" class="annotation" fill="#2563eb" font-weight="600">15,8 s · 77 % — EMPFEHLUNG</text>

  <!-- Gemma 3 27B: 24,5s, 73% -->
  <circle cx="135" cy="167" r="7" class="dot-mid"/>
  <text x="150" y="162" text-anchor="start" class="model-label" fill="#d97706">Gemma 3 27B</text>
  <text x="150" y="174" text-anchor="start" class="annotation">24,5 s · 73 %</text>

  <!-- LLaVA-Phi3: 9,4s, 50% -->
  <circle cx="101" cy="250" r="7" class="dot-mid"/>
  <text x="115" y="245" text-anchor="start" class="model-label" fill="#d97706">LLaVA-Phi3</text>
  <text x="115" y="257" text-anchor="start" class="annotation">9,4 s · 50 %</text>

  <!-- LLaVA 7B: 9,1s, 55% -->
  <circle cx="100" cy="232" r="7" class="dot-good"/>
  <text x="55" y="228" text-anchor="start" class="model-label" fill="#059669">LLaVA 7B</text>
  <text x="55" y="240" text-anchor="start" class="annotation">9,1 s · 55 %</text>

  <!-- Gemma 3 4B: 7,4s, 64% -->
  <circle cx="97" cy="199" r="7" class="dot-good"/>
  <text x="112" y="196" text-anchor="start" class="model-label" fill="#059669">Gemma 3 4B</text>
  <text x="112" y="208" text-anchor="start" class="annotation">7,4 s · 64 %</text>

  <!-- MiniCPM-V: 11,2s, 64% -->
  <circle cx="105" cy="199" r="7" class="dot-good"/>
  <text x="115" y="184" text-anchor="start" class="model-label" fill="#059669">MiniCPM-V</text>
  <text x="115" y="196" text-anchor="start" class="annotation" fill="#059669">11,2 s · 64 %</text>

  <!-- Llama 3.2 Vision: 19,3s, 68% -->
  <circle cx="123" cy="185" r="7" class="dot-good"/>
  <text x="158" y="215" text-anchor="start" class="model-label" fill="#059669">Llama 3.2 V.</text>
  <text x="158" y="227" text-anchor="start" class="annotation">19,3 s · 68 %</text>
  <line x1="128" y1="187" x2="156" y2="213" stroke="#059669" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- LLaVA 34B (Yi): 69,9s, 45% -->
  <circle cx="236" cy="268" r="7" class="dot-bad"/>
  <text x="251" y="264" text-anchor="start" class="model-label" fill="#dc2626">LLaVA 34B (Yi)</text>
  <text x="251" y="276" text-anchor="start" class="annotation">69,9 s · 45 %  ⚠ schlechter + 3× langsamer</text>

  <!-- Gemma 4 31B Q4: 146,7s, 77% -->
  <circle cx="408" cy="142" r="7" class="dot-mid"/>
  <text x="423" y="138" text-anchor="start" class="model-label" fill="#d97706">Gemma 4 31B (Q4)</text>
  <text x="423" y="150" text-anchor="start" class="annotation">146,7 s · 77 %  (gleich wie 13B, 9× langsamer)</text>

  <!-- Gemma 4 26B A4B (MoE): 255s, 64% -->
  <circle cx="650" cy="199" r="7" class="dot-bad"/>
  <text x="606" y="195" text-anchor="end" class="model-label" fill="#dc2626">Gemma 4 26B (MoE)</text>
  <text x="606" y="207" text-anchor="end" class="annotation">255 s · 64 %  ⚠ Deadlock-Outlier</text>

  <!-- BakLLaVA: 8,1s, 18% -->
  <circle cx="98" cy="365" r="7" class="dot-bad"/>
  <text x="115" y="362" text-anchor="start" class="model-label" fill="#dc2626">BakLLaVA</text>
  <text x="115" y="374" text-anchor="start" class="annotation">8,1 s · 18 %</text>

  <!-- LLaVA-Llama3: 60,2s, 14% -->
  <circle cx="215" cy="380" r="7" class="dot-bad"/>
  <text x="230" y="376" text-anchor="start" class="model-label" fill="#dc2626">LLaVA-Llama3</text>
  <text x="230" y="388" text-anchor="start" class="annotation">60,2 s · 14 %</text>

  <!-- Legend -->
  <rect x="540" y="330" width="200" height="82" fill="white" stroke="#ccc" rx="4"/>
  <text x="550" y="346" class="annotation" font-weight="600">Einordnung</text>
  <polygon points="555,358 559,368 569,368 561,374 564,384 555,378 546,384 549,374 541,368 551,368" fill="#2563eb"/>
  <text x="575" y="372" class="annotation">Empfehlung (LLaVA 13B)</text>
  <circle cx="555" cy="390" r="5" class="dot-good"/>
  <text x="575" y="394" class="annotation">Brauchbar</text>
  <circle cx="555" cy="406" r="5" class="dot-mid"/>
  <text x="575" y="410" class="annotation">Eingeschraenkt</text>
  <circle cx="670" cy="390" r="5" class="dot-bad"/>
  <text x="690" y="394" class="annotation">Nicht empfohlen</text>

  <!-- Caption under x-axis -->
  <text x="415" y="495" text-anchor="middle" class="subtitle">GPU-Nachtest 2026-04-15 — CPU-Werte lagen je nach Modell um Faktor 9 bis 116 hoeher</text>
</svg>
